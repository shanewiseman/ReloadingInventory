server {
    listen 80;
    server_name _;
    client_max_body_size 12m;

    location /static/ {
        alias /srv/static/;
        expires 1h;
    }

    location /api/ {
        proxy_pass http://storage:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://renderer:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

