# Production compose file for a single-host deployment behind Traefik and an
# Authentik middleware route.
#
# Run with:
#   docker compose -f compose.prod.yaml --env-file .env.production up --build -d
#
# Only the nginx service joins the external DMZ network. The storage API and
# renderer remain on the private Reload Ledger network.

x-app-defaults: &app-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-analysis-environment: &analysis-environment
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANALYSIS_OPENAI_MODEL: ${ANALYSIS_OPENAI_MODEL:-gpt-5.5}
  ANALYSIS_OPENAI_TIMEOUT_SECONDS: ${ANALYSIS_OPENAI_TIMEOUT_SECONDS:-150}
  ANALYSIS_REASONING_EFFORT: ${ANALYSIS_REASONING_EFFORT:-medium}
  ANALYSIS_DETECTION_MAX_OUTPUT_TOKENS: ${ANALYSIS_DETECTION_MAX_OUTPUT_TOKENS:-6000}
  ANALYSIS_REVIEW_MAX_OUTPUT_TOKENS: ${ANALYSIS_REVIEW_MAX_OUTPUT_TOKENS:-3000}
  ANALYSIS_MAX_IMAGE_BYTES: ${ANALYSIS_MAX_IMAGE_BYTES:-12582912}
  ANALYSIS_JOB_DIR: /tmp/reload-ledger-analysis
  ANALYSIS_JOB_TTL_SECONDS: ${ANALYSIS_JOB_TTL_SECONDS:-3600}

services:
  storage:
    <<: *app-defaults
    user: "10001:10001"
    container_name: reload-storage
    build:
      context: .
      dockerfile: storage_service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/reloading.sqlite3}
      SECRET_KEY: ${STORAGE_SECRET_KEY:?Set STORAGE_SECRET_KEY to a long random value}
      SESSION_HOURS: ${SESSION_HOURS:-12}
      LOCAL_RESET_ENABLED: ${LOCAL_RESET_ENABLED:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL to your external https URL}
      FILE_STORAGE_DIR: ${FILE_STORAGE_DIR:-/data/files}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
    volumes:
      - ${RELOAD_LEDGER_DATA_DIR:?Set RELOAD_LEDGER_DATA_DIR to the host data directory}:/data
    networks:
      - reload-ledger
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s

  renderer:
    <<: *app-defaults
    user: "10002:10002"
    container_name: reload-renderer
    build:
      context: .
      dockerfile: rendering_app/Dockerfile
    environment:
      <<: *analysis-environment
      STORAGE_URL: http://storage:5001
      SECRET_KEY: ${RENDERER_SECRET_KEY:?Set RENDERER_SECRET_KEY to a different long random value}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL to your external https URL}
      POS_PRINT_SERVICE_PORT: ${POS_PRINT_SERVICE_PORT:-8088}
      POS_PRINT_TIMEOUT_SECONDS: ${POS_PRINT_TIMEOUT_SECONDS:-8}
      RENDERER_TIMEOUT_SECONDS: ${RENDERER_TIMEOUT_SECONDS:-210}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
    depends_on:
      storage:
        condition: service_healthy
    networks:
      - reload-ledger
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  web:
    <<: *app-defaults
    image: nginxinc/nginx-unprivileged:1.27-alpine
    user: "101:101"
    container_name: reload-web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./rendering_app/static:/srv/static:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${DMZ_NETWORK:-dmz_internal}"
      - "traefik.http.routers.reload-ledger.rule=Host(`${RELOAD_LEDGER_HOST:?Set RELOAD_LEDGER_HOST to the public hostname}`)"
      - "traefik.http.routers.reload-ledger.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.reload-ledger.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-myresolver}"
      - "traefik.http.services.reload-ledger.loadbalancer.server.port=8080"
    depends_on:
      renderer:
        condition: service_healthy
    networks:
      - dmz_internal
      - reload-ledger
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

networks:
  dmz_internal:
    external: true
    name: ${DMZ_NETWORK:-dmz_internal}
  reload-ledger:
    name: reload-ledger
    driver: bridge
