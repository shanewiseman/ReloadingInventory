services:
  storage:
    user: "10001:10001"
    build:
      context: .
      dockerfile: storage_service/Dockerfile
    environment:
      DATABASE_URL: sqlite:////data/reloading.sqlite3
      SECRET_KEY: ${STORAGE_SECRET_KEY:-development-storage-secret}
      SESSION_HOURS: ${SESSION_HOURS:-12}
      LOCAL_RESET_ENABLED: ${LOCAL_RESET_ENABLED:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      FILE_STORAGE_DIR: /data/files
    volumes:
      - reloading-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 5s
      timeout: 3s
      retries: 20

  renderer:
    user: "10002:10002"
    build:
      context: .
      dockerfile: rendering_app/Dockerfile
    environment:
      STORAGE_URL: http://storage:5001
      SECRET_KEY: ${RENDERER_SECRET_KEY:-development-renderer-secret}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      POS_PRINT_TIMEOUT_SECONDS: ${POS_PRINT_TIMEOUT_SECONDS:-8}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    depends_on:
      storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    user: "101:101"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./rendering_app/static:/srv/static:ro
    depends_on:
      renderer:
        condition: service_healthy

  selenium:
    image: selenium/standalone-chrome:latest
    profiles: ["selenium"]
    shm_size: 2gb
    environment:
      SE_VNC_NO_PASSWORD: "1"
    ports:
      - "${SELENIUM_PORT:-4444}:4444"
      - "${SELENIUM_NOVNC_PORT:-7900}:7900"

volumes:
  reloading-data:
