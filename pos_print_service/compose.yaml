services:
  pos-printer:
    build:
      context: ..
      dockerfile: pos_print_service/Dockerfile
    restart: unless-stopped
    init: true
    environment:
      PRINTER_HOST: ${PRINTER_HOST:?Set PRINTER_HOST to the Rongta RP326 IP address}
      PRINTER_PORT: ${PRINTER_PORT:-9100}
      PRINTER_TIMEOUT_SECONDS: ${PRINTER_TIMEOUT_SECONDS:-5}
      PRINT_WIDTH_CHARS: ${PRINT_WIDTH_CHARS:-42}
      PRINT_IMAGE_WIDTH_PX: ${PRINT_IMAGE_WIDTH_PX:-576}
      LOGO_PATH: ${LOGO_PATH:-}
    ports:
      - "${POS_PRINT_SERVICE_PORT:-8088}:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 10s
      timeout: 3s
      retries: 20
